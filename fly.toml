# fly.toml app configuration file generated for fuel-tracker-api on 2026-02-27T21:38:07+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fuel-tracker-api'
primary_region = 'arn'

[build]

[deploy]
  release_command = "./migrate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
